{% extends "templates/layouts/base.html" %}
{% block title %}{{ Page.Title }} | {{ Site.Config.Site.Title }}{% endblock %}
{% block body %}
<div class="container" style="padding:3rem 0">
  <h1>{{ Page.Title }}</h1>
  {% if Items %}
  <ul style="margin-top:1rem">
    {% for item in Items %}
    <li style="margin:.5rem 0"><a href="{{ item.Permalink }}">{{ item.Title }}</a></li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="muted">No content yet.</p>
  {% endif %}
</div>
{% endblock %}
